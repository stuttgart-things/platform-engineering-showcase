---
version: 3
includes:
  git:
    taskfile: ./taskfiles/git.yaml
  lint:
    taskfile: ./taskfiles/linting.yaml
  # shell:
  #   taskfile: ./taskfiles/dagger-shell.yaml
vars:
  PROJECT_NAME:
    sh: echo ${PWD##*/}

tasks:
  run-terraform-shell:
    cmds:
      - |
        MOUNT=$(echo "{{.directory | join "\n"}}" | gum choose)
        dagger -c '
          container |
            from cgr.dev/chainguard/wolfi-base |
            with-exec apk add curl git bash wget terraform kubectl |
            with-mounted-directory "'"$MOUNT"'" "'"$MOUNT"'" |
            with-mounted-file /root/.kube/config ../../../.kube/keycloak-cluster |
            terminal
        '
    vars:
      directory:
        - keycloak

  destroy-kind-cluster:
    desc: Destroy a KinD cluster (warns on orphaned Crossplane-managed infra, prunes its kubeconfig)
    vars:
      KUBECONFIG_PATH: ~/.kube
    cmds:
      - |
        CLUSTERS=$(kind get clusters)
        if [ -z "$CLUSTERS" ]; then
          echo "No KinD clusters found."
          exit 0
        fi

        CLUSTER_NAME=$(echo "$CLUSTERS" | gum choose)
        echo "You chose: $CLUSTER_NAME"
        # create-kind-cluster writes the kubeconfig to KUBECONFIG_PATH/<name>.
        KUBECONFIG_FILE={{ .KUBECONFIG_PATH }}/"$CLUSTER_NAME"

        # ORPHAN CHECK â€” `kind delete` removes the cluster wholesale, so any Crossplane
        # managed resources (VMs in vSphere/Proxmox, â€¦) are ORPHANED, not deleted by their
        # providers. Warn (and offer to abort) so external infra can be torn down first.
        if [ -f "$KUBECONFIG_FILE" ]; then
          MANAGED=$(KUBECONFIG="$KUBECONFIG_FILE" kubectl get managed 2>/dev/null | tail -n +2 || true)
          if [ -n "$MANAGED" ]; then
            echo "âš ď¸Ź  This cluster still manages external infrastructure â€” it would be ORPHANED:"
            echo "$MANAGED" | sed 's/^/    /'
            echo "  Tear it down first, e.g.:  kubectl delete nativevspherevm <name> -n <ns>"
            echo "  and let the provider remove the real VMs, THEN destroy the cluster."
            gum confirm "Destroy anyway and orphan the above?" || { echo "Aborted."; exit 0; }
          fi
        fi

        if gum confirm "Do you really want to delete cluster $CLUSTER_NAME?"; then
          kind delete cluster --name "$CLUSTER_NAME"
          echo "Cluster $CLUSTER_NAME deleted."
          # PRUNE kubeconfig â€” `kind delete` leaves KUBECONFIG_PATH/<name> behind, which
          # then lingers as a stale entry in the bootstrap / deploy-* kubeconfig pickers.
          if [ -f "$KUBECONFIG_FILE" ]; then
            rm -f "$KUBECONFIG_FILE"
            echo "Removed stale kubeconfig $KUBECONFIG_FILE"
          fi
        else
          echo "Aborted."
        fi

  create-kind-cluster:
    desc: Create a new KinD cluster (KCL-generated config via Dagger, interactive)
    cmds:
      - |
        set -e
        mkdir -p {{ .KUBECONFIG_PATH }} || true

        # Generate the kind config via the stuttgart-things KCL OCI module through
        # Dagger. Show host ports already published by existing KinD nodes so you
        # don't collide (an apiServer/ingress port can only be owned by one cluster).
        echo "== Existing KinD clusters =="
        kind get clusters || true
        echo
        echo "== KinD node containers & published ports =="
        docker ps --filter "label=io.x-k8s.kind.cluster" || true
        echo
        # All host ports currently allocated â€” docker publishes (ANY container, not
        # just kind) + listening sockets â€” so you can pick a free apiServer / range.
        used_ports() {
          { docker ps 2>/dev/null | grep -oE ':[0-9]+->' | grep -oE '[0-9]+'
            ss -ltnH 2>/dev/null | awk '{print $4}' | grep -oE '[0-9]+$'; } | sort -un
        }
        echo "== Host ports already in use (docker + listeners) =="
        used_ports | tr '\n' ' '; echo
        echo

        # Default apiServerAddress to this host's primary IP.
        HOST_IP=$(ip route get 1.1.1.1 2>/dev/null \
          | awk '{for (i = 1; i <= NF; i++) if ($i == "src") { print $(i + 1); exit }}')
        [ -z "$HOST_IP" ] && HOST_IP=$(hostname -I 2>/dev/null | awk '{print $1}')

        CLUSTER_NAME=$(gum input --header "Cluster name" --value "kind")
        K8S_VERSION=$(echo "{{.k8s_versions | join "\n"}}" | gum choose \
          --header "Kubernetes version (kindest/node)")
        API_ADDR=$(gum input --header "apiServerAddress" --value "$HOST_IP")
        WORKER_COUNT=$(gum input --header "Number of worker nodes" --value "2")
        case "$WORKER_COUNT" in
          '' | *[!0-9]*) WORKER_COUNT=2 ;;
        esac

        # KCL booleans are capitalised (True/False).
        if gum confirm "disableDefaultCNI = true?"; then CNI_KCL=True; else CNI_KCL=False; fi
        KP_MODE=$(printf 'none\niptables\nipvs\n' | gum choose --header "kubeProxyMode")

        # Ingress: DISABLED by default (only one cluster per machine can own 80/443).
        if gum confirm --default=false "Enable ingress-ready (publish HTTP/HTTPS)? (only ONE cluster per machine)"; then
          INGRESS_KCL=True
          HTTP_PORT=$(gum input --header "Ingress HTTP host port -> container 80" --value "80")
          HTTPS_PORT=$(gum input --header "Ingress HTTPS host port -> container 443" --value "443")
        else
          INGRESS_KCL=False
          HTTP_PORT=80
          HTTPS_PORT=443
        fi

        # Port helpers â€” kind only errors on a clash AFTER the slow node-prep step,
        # so we pre-offer FREE defaults and re-check before creating. POSIX-safe
        # (task's shell interpreter is not bash): only `if`/`while` conditions,
        # no `&&{...}` standalones or nested command-subs. (used_ports defined above.)
        port_taken() { used_ports | grep -qx "$1"; }
        free_port() {
          p=$1
          while port_taken "$p"; do p=$((p+1)); done
          echo "$p"
        }
        free_range() {
          s=$1; c=$2
          while :; do
            ok=1; i=0
            while [ "$i" -lt "$c" ]; do
              if port_taken $((s+i)); then ok=0; break; fi
              i=$((i+1))
            done
            if [ "$ok" = 1 ]; then echo "$s"; return; fi
            s=$((s+1))
          done
        }
        needed_ports() {
          n="$API_PORT"; i=0
          while [ "$i" -lt "$RANGE_COUNT" ]; do n="$n $((RANGE_START+i))"; i=$((i+1)); done
          if [ "$INGRESS_KCL" = "True" ]; then n="$n $HTTP_PORT $HTTPS_PORT"; fi
          echo "$n"
        }
        clashes() {
          c=""
          for p in $(needed_ports); do
            if port_taken "$p"; then c="$c $p"; fi
          done
          echo "$c"
        }

        # Defaults are pre-computed to FREE values (into vars, not inline in --value),
        # so keeping them never clashes (apiServer 6443 is ALWAYS taken when another
        # kind cluster exists).
        RANGE_COUNT=$(gum input --header "Number of extra ports in range" --value "3")
        case "$RANGE_COUNT" in '' | *[!0-9]*) RANGE_COUNT=3 ;; esac
        DEF_API=$(free_port 6443)
        DEF_RANGE=$(free_range 32443 "$RANGE_COUNT")
        API_PORT=$(gum input --header "API server host port (container 6443)" --value "$DEF_API")
        RANGE_START=$(gum input --header "Extra port range start" --value "$DEF_RANGE")
        # EMPTY by default: the KCL module emits an old containerd-v1
        # `registry.mirrors` patch, which containerd 2.x (kindest/node for k8s
        # >=1.34/1.35) REJECTS ("`mirrors` cannot be set when `config_path` is
        # provided") â†’ CRI plugin fails to load â†’ kubelet can't start â†’ control-plane
        # never comes up. The docker.io passthrough mirror adds no value anyway.
        REGISTRY_MIRRORS=$(gum input \
          --header "registryMirrors (JSON array; leave [] â€” non-empty breaks containerd 2.x nodes)" \
          --value '[]')

        # Safety net: if an override still clashes, auto-pick (default YES) or abort.
        CLASH=$(clashes)
        if [ -n "$CLASH" ]; then
          echo "âś‹ Host port(s) already allocated:${CLASH}  (kind would publish:$(needed_ports))"
          if gum confirm --default=true "Auto-pick free apiServer + extra-range ports?"; then
            API_PORT=$(free_port "$API_PORT")
            RANGE_START=$(free_range "$RANGE_START" "$RANGE_COUNT")
            echo "â†’ apiServerPort=$API_PORT, extra range ${RANGE_START}..$((RANGE_START+RANGE_COUNT-1))"
            CLASH=$(clashes)
          fi
          if [ -n "$CLASH" ]; then echo "âś‹ Still clashing:${CLASH} â€” free those ports or disable ingress. Aborting."; exit 1; fi
        fi

        PROFILE=$(mktemp --suffix=.yaml)
        dagger call -m {{ .KCL_DAGGER_MODULE }} run \
          --format-output=false \
          --oci-source={{ .KIND_OCI_MODULE }} \
          --parameters "clusterName=$CLUSTER_NAME,nodeImage=kindest/node:$K8S_VERSION,apiServerAddress=$API_ADDR,workerCount=$WORKER_COUNT,disableDefaultCNI=$CNI_KCL,kubeProxyMode=$KP_MODE,ingressReady=$INGRESS_KCL,ingressHttpHostPort=$HTTP_PORT,ingressHttpsHostPort=$HTTPS_PORT,apiServerPort=$API_PORT,portRangeStart=$RANGE_START,portRangeCount=$RANGE_COUNT,registryMirrors=$REGISTRY_MIRRORS" \
          export --path="$PROFILE"

        echo "Generated config ($PROFILE):"
        cat "$PROFILE"

        if kind get clusters | grep -q "^$CLUSTER_NAME$"; then
          echo "Cluster $CLUSTER_NAME already exists."
          if gum confirm "Do you want to delete and recreate it?"; then
            kind delete cluster --name "$CLUSTER_NAME"
          else
            echo "Aborting."
            exit 0
          fi
        fi

        KUBECONFIG_FILE={{ .KUBECONFIG_PATH }}/"$CLUSTER_NAME"

        kind create cluster \
          --name "$CLUSTER_NAME" \
          --config "$PROFILE" \
          --kubeconfig "$KUBECONFIG_FILE"

        # Point the kubeconfig at the cluster's apiServerAddress (kind sometimes
        # writes 0.0.0.0/127.0.0.1). The address is a cert SAN, so TLS stays valid.
        SERVER_IP=$(awk '/apiServerAddress:/ {print $2; exit}' "$PROFILE" 2>/dev/null | tr -d "'\"")
        if [ -n "$SERVER_IP" ] && [ "$SERVER_IP" != "0.0.0.0" ]; then
          echo "Setting kubeconfig server address to $SERVER_IP"
          sed -i -E "s#(server: https://)[^:/]+(:[0-9]+)#\1${SERVER_IP}\2#" "$KUBECONFIG_FILE"
        fi

        # Install a CNI. With disableDefaultCNI=true the cluster ships no CNI, so
        # nodes stay NotReady until one is installed. Offer Cilium (CRDs via
        # kustomize, then the chart via the stuttgart-things helmfile).
        if gum confirm "Install Cilium CNI now? (required if disableDefaultCNI=true)"; then
          echo "Installing Cilium CRDs..."
          kubectl --kubeconfig "$KUBECONFIG_FILE" apply -k {{ .CILIUM_CRDS_KUSTOMIZE }}

          echo "Installing Cilium via helmfile (dagger)..."
          dagger call -m {{ .HELM_DAGGER_MODULE }} helmfile-operation \
            --helmfile-ref "{{ .CILIUM_HELMFILE_REF }}" \
            --operation apply \
            --state-values "config=kind,clusterName=$CLUSTER_NAME,configureLB=false" \
            --kube-config "file://$KUBECONFIG_FILE" \
            --progress plain

          echo "Waiting for nodes to become Ready..."
          kubectl --kubeconfig "$KUBECONFIG_FILE" wait --for=condition=Ready nodes --all --timeout=180s || true
        fi

        echo "Testing cluster access: kubectl --kubeconfig $KUBECONFIG_FILE get nodes"
        kubectl --kubeconfig "$KUBECONFIG_FILE" get nodes

        echo
        echo "To use this cluster:  export KUBECONFIG=$KUBECONFIG_FILE"
    vars:
      # 3 latest k8s versions shipped with the installed kind (v0.31.0 tops out at
      # v1.35.0; v1.36+ node images are built for kind v0.32.0). Bump when kind is.
      k8s_versions:
        - v1.35.0
        - v1.34.3
        - v1.33.7
      KUBECONFIG_PATH: ~/.kube
      # stuttgart-things KCL kind-cluster module rendered via Dagger
      KCL_DAGGER_MODULE: github.com/stuttgart-things/dagger/kcl@v0.119.0
      KIND_OCI_MODULE: ghcr.io/stuttgart-things/kind-cluster:0.4.0
      # optional CNI install (needed when disableDefaultCNI=true, i.e. no built-in CNI)
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.119.0
      CILIUM_CRDS_KUSTOMIZE: https://github.com/stuttgart-things/helm/infra/crds/cilium
      CILIUM_HELMFILE_REF: "git::https://github.com/stuttgart-things/helm.git@infra/cilium.yaml.gotmpl"

  deploy-platform:
    desc: Deploy the platform bundle (cilium/openebs/tekton/crossplane) via the central helmfile
    vars:
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.119.0
      HELM_GIT_REPO: git::https://github.com/stuttgart-things/helm.git
      BUNDLE_DIR: bundles
      BUNDLE_FILE: platform.yaml.gotmpl
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # KUBECONFIG â€” reuse the one already exported (confirm), else pick from ~/.kube.
        if [ -n "${KUBECONFIG:-}" ] && [ -f "${KUBECONFIG}" ] && gum confirm "Use current KUBECONFIG (${KUBECONFIG})?"; then
          echo "USING ${KUBECONFIG}"
        else
          SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
          export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
          echo "SWITCHING TO ${KUBECONFIG}"
        fi
        kubectl get nodes

        # SELECT COMPONENTS (pre-selected = bundle defaults)
        SELECTED=$(gum choose --no-limit --header "Components to deploy" \
          --selected="openebs,tekton,crossplane" \
          "openebs" "tekton" "crossplane" "cilium")
        [ -z "$SELECTED" ] && { echo "Nothing selected."; exit 0; }
        on() { echo "$SELECTED" | grep -qx "$1" && echo true || echo false; }
        STATE="openebsEnabled=$(on openebs),tektonEnabled=$(on tekton),crossplaneEnabled=$(on crossplane),ciliumEnabled=$(on cilium)"
        echo "Components: ${SELECTED//$'\n'/ }  ->  ${STATE}"

        gum confirm "Deploy platform bundle to ${KUBECONFIG}?" || exit 0

        # APPLY THE BUNDLE â€” composes the helm-repo helmfiles (remote) into one apply.
        dagger call -m {{ .HELM_DAGGER_MODULE }} \
          helmfile-operation \
          --operation apply \
          --src {{ .BUNDLE_DIR }} \
          --helmfile-ref {{ .BUNDLE_FILE }} \
          --state-values "${STATE}" \
          --kube-config file://${KUBECONFIG} \
          --progress plain -vv

        # FINALIZE CROSSPLANE â€” the bundle intentionally omits provider-configs
        # (their CRDs only exist once the providers/config are Healthy). Apply
        # them here, after waiting, if crossplane was part of this run.
        if echo "$SELECTED" | grep -qx crossplane; then
          echo "â–¶ Finalizing Crossplane provider-configs..."
          kubectl -n crossplane-system rollout status deploy/crossplane --timeout=180s
          kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          kubectl wait configuration.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          echo "Waiting for kubernetes.m.crossplane.io CRD (transitive provider-kubernetes)..."
          for i in $(seq 1 60); do
            kubectl get crd clusterproviderconfigs.kubernetes.m.crossplane.io >/dev/null 2>&1 && break
            sleep 5
          done
          kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          kubectl wait function.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          dagger call -m {{ .HELM_DAGGER_MODULE }} \
            helmfile-operation \
            --operation apply \
            --helmfile-ref "{{ .HELM_GIT_REPO }}@cicd/crossplane-provider-configs.yaml.gotmpl" \
            --kube-config file://${KUBECONFIG} \
            --progress plain -vv
        fi

        echo "âś… PLATFORM DEPLOYED"
        kubectl get nodes

  deploy-crossplane:
    desc: Deploy Crossplane (core, providers, functions/configs, provider-configs) via dagger helmfile-operation
    vars:
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.119.0
      HELM_GIT_REPO: git::https://github.com/stuttgart-things/helm.git
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # KUBECONFIG â€” reuse the one already exported (confirm), else pick from ~/.kube.
        if [ -n "${KUBECONFIG:-}" ] && [ -f "${KUBECONFIG}" ] && gum confirm "Use current KUBECONFIG (${KUBECONFIG})?"; then
          echo "USING ${KUBECONFIG}"
        else
          SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
          export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
          echo "SWITCHING TO ${KUBECONFIG}"
        fi
        kubectl get nodes

        gum confirm "Deploy Crossplane to ${KUBECONFIG}?" || exit 0

        apply() {
          echo "â–¶ APPLYING: $1"
          dagger call -m {{ .HELM_DAGGER_MODULE }} \
            helmfile-operation \
            --operation apply \
            --helmfile-ref "{{ .HELM_GIT_REPO }}@$1" \
            --kube-config file://${KUBECONFIG} \
            --progress plain -vv
        }

        # 1) CORE â€” installs Crossplane + package CRDs
        apply cicd/crossplane.yaml.gotmpl
        kubectl -n crossplane-system rollout status deploy/crossplane --timeout=180s

        # 2) PROVIDERS â€” Provider CRs + RBAC only (ProviderConfigs are a
        #    separate helmfile, applied in step 4 once the CRDs exist).
        apply cicd/crossplane-providers.yaml.gotmpl
        kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s

        # 3) FUNCTIONS + CONFIGURATIONS â€” Configurations pull provider-kubernetes
        #    transitively via dependsOn, which creates the kubernetes.m.crossplane.io CRD.
        apply cicd/crossplane-config.yaml.gotmpl
        kubectl wait configuration.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s

        # wait for the transitive provider-kubernetes CRD before applying provider-configs
        echo "Waiting for kubernetes.m.crossplane.io CRD (transitive provider-kubernetes)..."
        for i in $(seq 1 60); do
          kubectl get crd clusterproviderconfigs.kubernetes.m.crossplane.io >/dev/null 2>&1 && break
          sleep 5
        done
        kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
        kubectl wait function.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s

        # 4) PROVIDER-CONFIGS â€” separate helmfile; all ProviderConfig CRDs now exist
        apply cicd/crossplane-provider-configs.yaml.gotmpl

        echo "âś… CROSSPLANE DEPLOYED"
        kubectl get provider.pkg.crossplane.io,function.pkg.crossplane.io,configuration.pkg.crossplane.io

  deploy-tekton:
    desc: 'CI storage + pipelines: OpenEBS (gum-confirmed) + Tekton operator/pipeline'
    vars:
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.119.0
      HELM_GIT_REPO: git::https://github.com/stuttgart-things/helm.git
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # KUBECONFIG â€” reuse the one already exported (confirm), else pick from ~/.kube.
        if [ -n "${KUBECONFIG:-}" ] && [ -f "${KUBECONFIG}" ] && gum confirm "Use current KUBECONFIG (${KUBECONFIG})?"; then
          echo "USING ${KUBECONFIG}"
        else
          SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
          export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
          echo "SWITCHING TO ${KUBECONFIG}"
        fi
        kubectl get nodes

        # 1) OPENEBS â€” local-pv storage for Tekton PipelineRun workspaces. Optional:
        #    skip if the cluster already has a StorageClass you want to use.
        if gum confirm "Deploy OpenEBS (local-pv storage for pipelines)?"; then
          echo "â–¶ APPLYING: infra/openebs.yaml.gotmpl"
          dagger call -m {{ .HELM_DAGGER_MODULE }} helmfile-operation --operation apply \
            --helmfile-ref "{{ .HELM_GIT_REPO }}@infra/openebs.yaml.gotmpl" \
            --kube-config file://${KUBECONFIG} --progress plain -vv
          kubectl -n openebs rollout status deploy/openebs-localpv-provisioner --timeout=180s
        else
          echo "  âŹ­  skipped OpenEBS"
        fi

        gum confirm "Deploy Tekton to ${KUBECONFIG}?" || exit 0

        # 2) TEKTON â€” operator; with autoInstallComponents=false + enableTektonPipeline=true
        #    the chart renders a TektonPipeline CR (Pipelines only, no Dashboard/Triggers/Chains).
        echo "â–¶ APPLYING: cicd/tekton.yaml.gotmpl"
        dagger call -m {{ .HELM_DAGGER_MODULE }} helmfile-operation --operation apply \
          --helmfile-ref "{{ .HELM_GIT_REPO }}@cicd/tekton.yaml.gotmpl" \
          --kube-config file://${KUBECONFIG} --progress plain -vv

        kubectl -n tekton-operator rollout status deploy/tekton-operator --timeout=180s
        echo "Waiting for TektonPipeline CR to be created by the operator..."
        for i in $(seq 1 60); do
          kubectl get tektonpipeline pipeline >/dev/null 2>&1 && break
          sleep 5
        done
        kubectl wait tektonpipeline --all --for=condition=Ready --timeout=300s

        echo "âś… TEKTON DEPLOYED (+ OpenEBS if selected)"
        kubectl get tektonpipeline
        kubectl -n tekton-pipelines get pods

  deploy-configurations:
    desc: 'Install crossplane Configuration packages (vspherevm/proxmoxvm) + wait for their provider CRDs â€” the "crossplane config" step before capabilities'
    vars:
      KUBECONFIG_PATH: ~/.kube
      # Configuration OCI packages (each pulls its provider via dependsOn).
      VSPHEREVM_PKG: ghcr.io/stuttgart-things/crossplane-configurations/vspherevm:v0.6.0
      PROXMOXVM_PKG: ghcr.io/stuttgart-things/crossplane-configurations/proxmoxvm:v0.4.0
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # KUBECONFIG â€” reuse the one already exported (confirm), else pick from ~/.kube.
        if [ -n "${KUBECONFIG:-}" ] && [ -f "${KUBECONFIG}" ] && gum confirm "Use current KUBECONFIG (${KUBECONFIG})?"; then
          echo "USING ${KUBECONFIG}"
        else
          SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
          export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
          echo "SWITCHING TO ${KUBECONFIG}"
        fi
        kubectl get nodes

        CFGS=$(gum choose --no-limit --header "Configuration packages (each installs its provider via dependsOn)" \
          --selected="vspherevm" vspherevm proxmoxvm)
        [ -z "$CFGS" ] && { echo "Nothing selected."; exit 0; }

        pkg() { case "$1" in vspherevm) echo {{ .VSPHEREVM_PKG }};; proxmoxvm) echo {{ .PROXMOXVM_PKG }};; esac; }
        # The ClusterProviderConfig CRD each provider registers â€” gated on before capabilities.
        crd() { case "$1" in
          vspherevm) echo clusterproviderconfigs.vspherevm.m.stuttgart-things.com;;
          proxmoxvm) echo clusterproviderconfigs.proxmoxbpg.m.crossplane.io;;
        esac; }

        gum confirm "Install Configuration(s) [${CFGS//$'\n'/ }] to ${KUBECONFIG}?" || exit 0

        # 1) APPLY the Configuration CRs (printf avoids heredoc-indent pitfalls in YAML).
        for cfg in $CFGS; do
          echo "â–¶ Configuration/$cfg  ($(pkg "$cfg"))"
          printf 'apiVersion: pkg.crossplane.io/v1\nkind: Configuration\nmetadata:\n  name: %s\nspec:\n  package: %s\n' \
            "$cfg" "$(pkg "$cfg")" | kubectl apply -f -
        done

        # 2) WAIT â€” Configuration Healthy, then its provider's ClusterProviderConfig CRD.
        #    The provider is pulled transitively via dependsOn, so its CRD registers a
        #    little AFTER the Configuration reports Healthy. Capabilities' ClusterProviderConfig
        #    needs that CRD (this is the ordering that a single capability-chart apply races).
        #    (Cross-mirror function deps â€” e.g. function-kcl xpkg.crossplane.io vs installed
        #    xpkg.upbound.io â€” resolve by digest after a brief "missing dependencies" blip.)
        for cfg in $CFGS; do
          echo "âŹł $cfg: Configuration Healthy..."
          kubectl wait configuration.pkg.crossplane.io/$cfg --for=condition=Healthy --timeout=300s
          echo "âŹł $cfg: provider CRD $(crd "$cfg")..."
          for i in $(seq 1 60); do
            kubectl get crd "$(crd "$cfg")" >/dev/null 2>&1 && break
            sleep 5
          done
          kubectl wait --for=condition=established crd/"$(crd "$cfg")" --timeout=120s
          echo "  âś“ $cfg ready"
        done

        echo "âś… CONFIGURATIONS READY"
        echo "   â†’ run deploy-capabilities with 'Install the Configuration OCI package?' = No"
        kubectl get configuration.pkg.crossplane.io
        kubectl get provider.pkg.crossplane.io \
          -o custom-columns=NAME:.metadata.name,HEALTHY:.status.conditions'[?(@.type=="Healthy")].status'

  deploy-capabilities:
    desc: Deploy vspherevm/ansible/proxmoxvm platform capabilities from OCI charts (env-map) to a cluster
    vars:
      CHARTS_OCI: oci://ghcr.io/stuttgart-things/charts
      KUBECONFIG_PATH: ~/.kube
      # age-encrypted creds blobs for the sops backend (variant B, supplied at deploy).
      SECRETS_DIR: '{{ .SECRETS_DIR | default "~/projects/stuttgart-things/secrets" }}'
      # Pinned chart versions (bump on release).
      VSPHEREVM_VER: "0.8.0"
      ANSIBLE_VER: "0.3.0"
      PROXMOXVM_VER: "0.3.0"
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e
        SECRETS_DIR=$(eval echo {{ .SECRETS_DIR }})

        # KUBECONFIG â€” reuse the one already exported (confirm), else pick from ~/.kube.
        if [ -n "${KUBECONFIG:-}" ] && [ -f "${KUBECONFIG}" ] && gum confirm "Use current KUBECONFIG (${KUBECONFIG})?"; then
          echo "USING ${KUBECONFIG}"
        else
          SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
          export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
          echo "SWITCHING TO ${KUBECONFIG}"
        fi
        kubectl get nodes

        # SELECT ENV (chart env-map key) + CAPABILITIES
        # NOTE: ansible depends on vspherevm. The `ansible` capability only lands the
        # ansible-credentials Secret (tekton-ci) + EnvironmentConfig; the AnsibleRun
        # CRD it relies on is provided by the `ansible-run` Configuration, which is
        # pulled TRANSITIVELY via the vspherevm Configuration's dependsOn (installed by
        # deploy-configurations). So a vspherevm+ansible cluster is the supported combo;
        # deploying ansible ALONE gives you creds but no AnsibleRun CRD until vspherevm
        # (its Configuration) is also installed.
        # ENV(S) â€” multi-select: one cluster can serve several vSphere envs at once.
        # vspherevm/proxmoxvm resources are env-suffixed (â€¦-labul, â€¦-labda) so they
        # coexist. ansible is env-INDEPENDENT (fixed-name EnvironmentConfig ansible-run-
        # defaults / ansible-credentials Secret / rbac in tekton-ci) â†’ installed ONCE
        # regardless of how many envs you pick (two ansible releases would collide).
        ENVS=$(printf 'labda\nlabul\n' | gum choose --no-limit --selected="labul" --header "Environment(s) (chart env-map)")
        [ -z "$ENVS" ] && { echo "No environment selected."; exit 0; }
        CAPS=$(gum choose --no-limit --header "Capabilities to deploy" \
          --selected="vspherevm,ansible" vspherevm ansible proxmoxvm)
        [ -z "$CAPS" ] && { echo "Nothing selected."; exit 0; }

        # Creds-Secret backend: none (out-of-band) | eso (Vault) | sops (age-encrypted
        # blob from $SECRETS_DIR, materialized by sops-secrets-operator).
        BACKEND=$(printf 'sops\nnone\neso\n' | gum choose --header "Creds backend for this cluster")

        # Configuration package install: skip on dev clusters where the XRD+Composition
        # are already applied by hand (vsphere/proxmox only; ansible has no package).
        if gum confirm "Install the Configuration OCI package? (No = XRD/Composition already present, e.g. kind)"; then INSTALL_CFG=true; else INSTALL_CFG=false; fi

        gum confirm "Deploy [${CAPS//$'\n'/ }] env(s)=[${ENVS//$'\n'/ }] backend=$BACKEND to ${KUBECONFIG}?" || exit 0

        ver() { case "$1" in vspherevm) echo {{ .VSPHEREVM_VER }};; ansible) echo {{ .ANSIBLE_VER }};; proxmoxvm) echo {{ .PROXMOXVM_VER }};; esac; }
        # creds blob per capability+env ($2). ansible's blob is env-independent.
        credfile() {
          case "$1" in
            vspherevm) echo "$SECRETS_DIR/vsphere-creds-$2.enc.yaml";;
            proxmoxvm) echo "$SECRETS_DIR/proxmox-creds-$2.enc.yaml";;
            ansible)   echo "$SECRETS_DIR/ansible-credentials.enc.yaml";;
          esac
        }
        # Never fight a pre-existing Configuration: if the package is already installed
        # (e.g. by deploy-configurations, via kubectl) the chart can't adopt it â€”
        # `configuration.install=true` fails with "invalid ownership metadata". So force
        # install=false whenever the Configuration/<cap> already exists, regardless of prompt.
        cfg_installed() { kubectl get configuration.pkg.crossplane.io "$1" >/dev/null 2>&1; }
        flags() {
          local cap="$1" env="$2" out="" inst="$INSTALL_CFG"
          if [ "$cap" = "ansible" ]; then
            out="--set sshCredentials.backend=$BACKEND"
            if [ "$BACKEND" = "sops" ]; then out="$out --set-file sshCredentials.sops.encryptedCredentials=$(credfile "$cap" "$env")"; fi
          else
            if cfg_installed "$cap"; then inst=false; fi
            out="--set secretStore.backend=$BACKEND --set configuration.install=$inst"
            if [ "$BACKEND" = "sops" ]; then out="$out --set-file secretStore.sops.encryptedCredentials=$(credfile "$cap" "$env")"; fi
          fi
          echo "$out"
        }

        FIRST_ENV=$(echo "$ENVS" | head -1)
        for cap in $CAPS; do
          if [ "$cap" = "ansible" ]; then
            # env-independent â†’ single release "ansible" (uses the first selected env only
            # for the env-map selector; in sops mode that doesn't affect the materialized creds).
            echo "â–¶ ansible (env-independent, one install) v$(ver ansible) backend=$BACKEND"
            helm upgrade --install ansible {{ .CHARTS_OCI }}/ansible --version "$(ver ansible)" \
              --set environment="$FIRST_ENV" $(flags ansible "$FIRST_ENV") \
              -n crossplane-system --create-namespace
          else
            for env in $ENVS; do
              echo "â–¶ $cap ($env) v$(ver "$cap") backend=$BACKEND"
              helm upgrade --install "$cap-$env" {{ .CHARTS_OCI }}/"$cap" --version "$(ver "$cap")" \
                --set environment="$env" $(flags "$cap" "$env") \
                -n crossplane-system --create-namespace
            done
          fi
        done

        echo "âś… CAPABILITIES DEPLOYED"
        helm list -n crossplane-system | grep -E 'vspherevm|ansible|proxmoxvm' || true
        kubectl get environmentconfig 2>/dev/null || true

  deploy-sops-operator:
    desc: 'Secrets layer: cert-manager (deployed only if missing) + sops-secrets-operator + age key'
    vars:
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.119.0
      HELM_GIT_REPO: git::https://github.com/stuttgart-things/helm.git
      SOPS_OPERATOR_REF: v0.8.4
      SOPS_OPERATOR_KUSTOMIZE: https://github.com/stuttgart-things/sops-secrets-operator/config/default
      # Namespaces where consumer CRs (InlineSopsSecret) live â€” keyRef resolves in the CR's own namespace.
      KEY_NAMESPACES: crossplane-system tekton-ci
      AGE_SECRET_NAME: sops-age-key
      AGE_SECRET_KEY: age.agekey
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # PRECONDITION â€” the age *private* key must be in the environment (never committed).
        if [ -z "${SOPS_AGE_KEY:-}" ]; then
          echo "âś‹ SOPS_AGE_KEY is not set. Export the project age private key first:"
          echo "   export SOPS_AGE_KEY=\$(cat /path/to/keys.txt)   # or your keychain"
          exit 1
        fi

        # KUBECONFIG â€” reuse the one already exported (confirm), else pick from ~/.kube.
        if [ -n "${KUBECONFIG:-}" ] && [ -f "${KUBECONFIG}" ] && gum confirm "Use current KUBECONFIG (${KUBECONFIG})?"; then
          echo "USING ${KUBECONFIG}"
        else
          SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
          export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
          echo "SWITCHING TO ${KUBECONFIG}"
        fi
        kubectl get nodes

        # 1) CERT-MANAGER â€” the sops-operator's conversion webhook needs it. Often already
        #    present (managed elsewhere), so skip if found; otherwise offer to deploy it.
        if kubectl get deploy -n cert-manager cert-manager >/dev/null 2>&1; then
          echo "âś“ cert-manager already present â€” skipping."
        elif gum confirm "cert-manager not found. Deploy it? (required by sops-operator)"; then
          echo "â–¶ APPLYING: infra/cert-manager.yaml.gotmpl"
          dagger call -m {{ .HELM_DAGGER_MODULE }} helmfile-operation --operation apply \
            --helmfile-ref "{{ .HELM_GIT_REPO }}@infra/cert-manager.yaml.gotmpl" \
            --kube-config file://${KUBECONFIG} --progress plain -vv
          kubectl -n cert-manager rollout status deploy/cert-manager --timeout=180s
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s
        else
          echo "âš ď¸Ź  Proceeding without cert-manager â€” the sops webhook cert won't be issued."
        fi

        gum confirm "Deploy sops-secrets-operator ({{ .SOPS_OPERATOR_REF }}) to ${KUBECONFIG}?" || exit 0

        # 2) OPERATOR â€” CRDs + RBAC + controller + webhook Issuer/Certificate (kustomize; no helm chart exists).
        echo "â–¶ kubectl apply -k {{ .SOPS_OPERATOR_KUSTOMIZE }}?ref={{ .SOPS_OPERATOR_REF }}"
        kubectl apply -k "{{ .SOPS_OPERATOR_KUSTOMIZE }}?ref={{ .SOPS_OPERATOR_REF }}"
        kubectl -n sops-secrets-operator-system rollout status deployment --timeout=180s

        # 3) AGE KEY â€” the sops-age-key Secret the InlineSopsSecret CRs decrypt with.
        #    keyRef resolves in the CR's namespace, so install it into every consumer namespace.
        for ns in {{ .KEY_NAMESPACES }}; do
          kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          # value never echoed; --dry-run|apply keeps it idempotent.
          kubectl -n "$ns" create secret generic {{ .AGE_SECRET_NAME }} \
            --from-literal={{ .AGE_SECRET_KEY }}="$SOPS_AGE_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "  âś“ {{ .AGE_SECRET_NAME }} in $ns"
        done

        echo "âś… SECRETS LAYER READY (cert-manager + sops-operator + age key)"
        kubectl -n sops-secrets-operator-system get pods

  # ---------------------------------------------------------------------------
  # Cluster bootstrap â€” two tiers:
  #   substrate : create-kind-cluster (kind + cilium)  â€” any cluster type
  #   profile   : profile-<name> (the cluster TYPE)    â€” machinery, gitops, â€¦
  # `bootstrap` orchestrates substrate â†’ chosen profile(s). Each profile installs
  # exactly the platform pieces it needs (the machinery profile brings its own
  # secrets layer, storage/tekton, crossplane, â€¦). Add a new cluster type by adding
  # a profile-<name> task and listing it in bootstrap.
  # ---------------------------------------------------------------------------

  bootstrap:
    desc: 'Build a cluster: substrate (kind+cilium) â†’ choose profile(s) [machinery, â€¦]'
    cmds:
      - |
        set -e
        gum style --border double --padding "1 2" --margin 1 \
          "CLUSTER BOOTSTRAP" \
          "substrate (kind+cilium) â†’ profile(s)"

        step() { if gum confirm "â–¶ $1  (task: $2)?"; then task "$2"; else echo "  âŹ­  skipped: $1"; fi; }

        # 1) SUBSTRATE â€” kind cluster + cilium CNI (profile-agnostic).
        step "substrate: kind cluster + cilium CNI" create-kind-cluster

        # 2) PROFILE(S) â€” the cluster type. Extend with more profile-<name> tasks.
        PROFILES=$(gum choose --no-limit --header "Cluster profile(s) to apply" \
          --selected="machinery" machinery)
        [ -z "$PROFILES" ] && { echo "No profile selected â€” cluster has substrate only."; exit 0; }
        for p in $PROFILES; do
          step "profile: $p" "profile-$p"
        done

        gum style --foreground 42 "âś… BOOTSTRAP COMPLETE"

  profile-machinery:
    desc: 'Machinery profile (VM builder): secrets â†’ storage/tekton â†’ crossplane â†’ configurations â†’ capabilities'
    cmds:
      - |
        set -e
        gum style --border normal --padding "0 1" \
          "PROFILE: machinery (VM builder)" \
          "sops-operator â†’ openebs/tekton â†’ crossplane â†’ configurations â†’ capabilities"
        step() { if gum confirm "â–¶ $1  (task: $2)?"; then task "$2"; else echo "  âŹ­  skipped: $1"; fi; }
        # secrets layer: cert-manager (if missing) + sops-operator + age key (crossplane-system, tekton-ci).
        step "secrets layer (cert-manager + sops-operator + age key)" deploy-sops-operator
        # storage + tekton â€” runs the ansible base-OS PipelineRuns emitted by vspherevm+ansible.
        step "storage + tekton (openebs + pipelines)" deploy-tekton
        # crossplane core + providers + config + provider-configs (deploy-crossplane WAITS
        # for the core rollout + pkg.crossplane.io CRDs â€” the deploy-platform bundle races them).
        step "crossplane (core + providers + config)" deploy-crossplane
        # Configuration packages + their providers. Must precede capabilities: the capability
        # chart's ClusterProviderConfig needs the provider CRD this step installs & heals.
        step "crossplane config (Configuration packages + providers)" deploy-configurations
        # capabilities (vspherevm/ansible/proxmoxvm, backend=sops). Answer
        # 'Install the Configuration OCI package?' = No â€” the step above already did it.
        step "capabilities (vspherevm/ansible/proxmoxvm)" deploy-capabilities
        gum style --foreground 42 "âś… MACHINERY PROFILE READY"

  check-machinery:
    desc: 'Read-only status: nodes, crossplane packages, per-env wiring, secrets, pods, VMs â€” is the cluster ready to build VMs?'
    vars:
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e
        # KUBECONFIG â€” reuse the one already exported (confirm), else pick from ~/.kube.
        if [ -n "${KUBECONFIG:-}" ] && [ -f "${KUBECONFIG}" ] && gum confirm "Use current KUBECONFIG (${KUBECONFIG})?"; then
          :
        else
          SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
          export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
        fi
        gum style --border normal --padding "0 1" "MACHINERY STATUS â€” ${KUBECONFIG}"

        echo "== nodes =="
        kubectl get nodes 2>/dev/null || echo "  (cluster unreachable)"

        echo; echo "== crossplane packages (default output shows INSTALLED/HEALTHY) =="
        kubectl get provider.pkg.crossplane.io 2>/dev/null || echo "  (no providers)"
        echo
        kubectl get function.pkg.crossplane.io 2>/dev/null || echo "  (no functions)"
        echo
        kubectl get configuration.pkg.crossplane.io 2>/dev/null || echo "  (no configurations)"

        echo; echo "== per-env wiring (vsphere) =="
        kubectl get clusterproviderconfig.vspherevm.m.stuttgart-things.com 2>/dev/null || echo "  (no vsphere ClusterProviderConfigs)"
        kubectl get environmentconfig 2>/dev/null || echo "  (no EnvironmentConfigs)"

        echo; echo "== secrets =="
        kubectl get secret -n crossplane-system 2>/dev/null | grep -E 'NAME|vsphere-creds|proxmox-creds|sops-age-key' || echo "  (no creds/age-key in crossplane-system)"
        kubectl get secret -n tekton-ci 2>/dev/null | grep -E 'ansible-credentials|sops-age-key' || echo "  (no ansible-credentials/age-key in tekton-ci)"
        kubectl get inlinesopssecret -A 2>/dev/null || echo "  (no InlineSopsSecrets)"

        echo; echo "== capability helm releases =="
        helm list -n crossplane-system 2>/dev/null | grep -E 'NAME|vspherevm|ansible|proxmoxvm' || echo "  (none)"

        echo; echo "== pods (platform namespaces) =="
        for ns in crossplane-system sops-secrets-operator-system tekton-pipelines cert-manager openebs; do
          echo "-- $ns --"
          kubectl get pods -n "$ns" --no-headers 2>/dev/null || echo "  (namespace absent)"
        done

        echo; echo "== existing VMs / XRs =="
        kubectl get nativevspherevm.resources.stuttgart-things.com -A 2>/dev/null || echo "  (no NativeVsphereVM XRs / CRD absent)"
        kubectl get virtualmachine.virtualmachine.vspherevm.m.stuttgart-things.com -A 2>/dev/null || true

        # READINESS VERDICT â€” vspherevm Configuration Healthy + a ClusterProviderConfig + creds.
        echo; echo "== readiness =="
        CFG_OK=no; PC_OK=no; SEC_OK=no
        if kubectl get configuration.pkg.crossplane.io vspherevm -o jsonpath='{.status.conditions[?(@.type=="Healthy")].status}' 2>/dev/null | grep -q '^True$'; then CFG_OK=yes; fi
        if [ -n "$(kubectl get clusterproviderconfig.vspherevm.m.stuttgart-things.com -o name 2>/dev/null)" ]; then PC_OK=yes; fi
        if kubectl get secret -n crossplane-system 2>/dev/null | grep -q vsphere-creds; then SEC_OK=yes; fi
        echo "  vspherevm Configuration Healthy: $CFG_OK | ClusterProviderConfig: $PC_OK | vsphere-creds Secret: $SEC_OK"
        if [ "$CFG_OK" = yes ] && [ "$PC_OK" = yes ] && [ "$SEC_OK" = yes ]; then
          gum style --foreground 42 "âś… READY â€” apply a NativeVsphereVM with spec.environmentConfig=<env> to build a VM"
        else
          gum style --foreground 196 "âś— NOT ready â€” see the three checks above (need deploy-configurations + deploy-capabilities)"
        fi

  do:
    desc: Select a task to run
    cmds:
      - |
        # Extract task names (keep internal colons, remove only trailing colon)
        task_name=$(task -l | awk '/^\*/ {print $2}' | sed 's/:$//' | gum choose)

        # Run the selected task
        [ -n "$task_name" ] && task "$task_name"

  lint-platform-engineering-showcase-repo:
    desc: Lint platform-engineering-showcase repository
    cmds:
      - task: lint:lint-repository-files
        vars:
          CODE_DIR: "./"
          YAML_CONFIG_PATH: ".yamllint.yml"
          #EXPORT_PATH: "/tmp/whatever-showcase.txt"

  default:
    desc: Default task is select & do (work)
    cmds:
      - task do

  run-pre-commit-hook:
    deps:
      - check
    desc: "Run the pre-commit hook script to replace .example.com with .example.com"
    cmds:
      - |
        # Find all YAML files in the repository recursively, excluding Taskfile.yaml
        files=$(find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.yml" -o -name "*.md" \) ! -name "Taskfile.yaml")

        # Loop through each file
        for file in $files; do
          # Skip binary files
          if file "$file" | grep -q "text"; then
            # Replace the string and update the file
            sed -i 's/\.sva\.de/\.example\.com/g' "$file"
          fi
        done

        # Add all modified YAML files back to staging
        git add $(git ls-files --modified | grep -E '\.ya?ml$')

        exit 0
    silent: false
