---
version: 3
includes:
  git:
    taskfile: ./taskfiles/git.yaml
  lint:
    taskfile: ./taskfiles/linting.yaml
  # shell:
  #   taskfile: ./taskfiles/dagger-shell.yaml
vars:
  PROJECT_NAME:
    sh: echo ${PWD##*/}

tasks:
  run-terraform-shell:
    cmds:
      - |
        MOUNT=$(echo "{{.directory | join "\n"}}" | gum choose)
        dagger -c '
          container |
            from cgr.dev/chainguard/wolfi-base |
            with-exec apk add curl git bash wget terraform kubectl |
            with-mounted-directory "'"$MOUNT"'" "'"$MOUNT"'" |
            with-mounted-file /root/.kube/config ../../../.kube/keycloak-cluster |
            terminal
        '
    vars:
      directory:
        - keycloak

  destroy-kind-cluster:
    desc: Destroy a KinD cluster
    cmds:
      - |
        CLUSTERS=$(kind get clusters)
        if [ -z "$CLUSTERS" ]; then
          echo "No KinD clusters found."
          exit 0
        fi

        CLUSTER_NAME=$(echo "$CLUSTERS" | gum choose)
        echo "You chose: $CLUSTER_NAME"

        if gum confirm "Do you really want to delete cluster $CLUSTER_NAME?"; then
          kind delete cluster --name "$CLUSTER_NAME"
          echo "Cluster $CLUSTER_NAME deleted."
        else
          echo "Aborted."
        fi

  create-kind-cluster:
    desc: Create a new KinD cluster (from a profile or generated interactively)
    cmds:
      - |
        set -e
        mkdir -p {{ .KUBECONFIG_PATH }} || true

        MODE=$(gum choose --header "How do you want to create the cluster?" \
          "existing-profile" "generate-kcl")

        if [ "$MODE" = "existing-profile" ]; then
          PROFILE=$(echo "{{.profiles | join "\n"}}" | gum choose --header "Choose a profile")
          echo "You chose: $PROFILE"
          CLUSTER_NAME=$(basename "$PROFILE" .yaml)
        else
          # Render via the stuttgart-things KCL OCI module through Dagger.
          # Show host ports already published by existing KinD nodes, so you
          # don't collide on ingress ports (80/443 can only be owned by one
          # cluster per machine).
          echo "== Existing KinD clusters =="
          kind get clusters || true
          echo
          echo "== KinD node containers & published ports =="
          docker ps --filter "label=io.x-k8s.kind.cluster" || true
          echo
          echo "== Host ports already published by KinD nodes =="
          docker ps --filter "label=io.x-k8s.kind.cluster" \
            | grep -oE ':[0-9]+->' | tr -d ':->' | sort -un || true
          echo

          # Default apiServerAddress to this host's primary IP.
          HOST_IP=$(ip route get 1.1.1.1 2>/dev/null \
            | awk '{for (i = 1; i <= NF; i++) if ($i == "src") { print $(i + 1); exit }}')
          [ -z "$HOST_IP" ] && HOST_IP=$(hostname -I 2>/dev/null | awk '{print $1}')

          CLUSTER_NAME=$(gum input --header "Cluster name" --value "kind")
          K8S_VERSION=$(echo "{{.k8s_versions | join "\n"}}" | gum choose \
            --header "Kubernetes version (kindest/node)")
          API_ADDR=$(gum input --header "apiServerAddress" --value "$HOST_IP")
          WORKER_COUNT=$(gum input --header "Number of worker nodes" --value "2")
          case "$WORKER_COUNT" in
            '' | *[!0-9]*) WORKER_COUNT=2 ;;
          esac

          # KCL booleans are capitalised (True/False).
          if gum confirm "disableDefaultCNI = true?"; then CNI_KCL=True; else CNI_KCL=False; fi
          KP_MODE=$(printf 'none\niptables\nipvs\n' | gum choose --header "kubeProxyMode")

          # Ingress: add ingress-ready label + publish 80/443 (configurable host ports).
          if gum confirm "Enable ingress-ready (publish HTTP/HTTPS)? (only ONE cluster per machine)"; then
            INGRESS_KCL=True
            HTTP_PORT=$(gum input --header "Ingress HTTP host port -> container 80" --value "80")
            HTTPS_PORT=$(gum input --header "Ingress HTTPS host port -> container 443" --value "443")
          else
            INGRESS_KCL=False
            HTTP_PORT=80
            HTTPS_PORT=443
          fi

          API_PORT=$(gum input --header "API server host port (container 6443)" --value "6443")
          RANGE_START=$(gum input --header "Extra port range start" --value "32443")
          RANGE_COUNT=$(gum input --header "Number of extra ports in range" --value "6")
          REGISTRY_MIRRORS=$(gum input \
            --header "registryMirrors (JSON array; single entry avoids comma clash)" \
            --value '["https://registry-1.docker.io"]')

          PROFILE=$(mktemp --suffix=.yaml)
          dagger call -m {{ .KCL_DAGGER_MODULE }} run \
            --format-output=false \
            --oci-source={{ .KIND_OCI_MODULE }} \
            --parameters "clusterName=$CLUSTER_NAME,nodeImage=kindest/node:$K8S_VERSION,apiServerAddress=$API_ADDR,workerCount=$WORKER_COUNT,disableDefaultCNI=$CNI_KCL,kubeProxyMode=$KP_MODE,ingressReady=$INGRESS_KCL,ingressHttpHostPort=$HTTP_PORT,ingressHttpsHostPort=$HTTPS_PORT,apiServerPort=$API_PORT,portRangeStart=$RANGE_START,portRangeCount=$RANGE_COUNT,registryMirrors=$REGISTRY_MIRRORS" \
            export --path="$PROFILE"

          echo "Generated config ($PROFILE):"
          cat "$PROFILE"
        fi

        if kind get clusters | grep -q "^$CLUSTER_NAME$"; then
          echo "Cluster $CLUSTER_NAME already exists."
          if gum confirm "Do you want to delete and recreate it?"; then
            kind delete cluster --name "$CLUSTER_NAME"
          else
            echo "Aborting."
            exit 0
          fi
        fi

        KUBECONFIG_FILE={{ .KUBECONFIG_PATH }}/"$CLUSTER_NAME"

        kind create cluster \
          --name "$CLUSTER_NAME" \
          --config "$PROFILE" \
          --kubeconfig "$KUBECONFIG_FILE"

        # Point the kubeconfig at the cluster's apiServerAddress (kind sometimes
        # writes 0.0.0.0/127.0.0.1). The address is a cert SAN, so TLS stays valid.
        SERVER_IP=$(awk '/apiServerAddress:/ {print $2; exit}' "$PROFILE" 2>/dev/null | tr -d "'\"")
        if [ -n "$SERVER_IP" ] && [ "$SERVER_IP" != "0.0.0.0" ]; then
          echo "Setting kubeconfig server address to $SERVER_IP"
          sed -i -E "s#(server: https://)[^:/]+(:[0-9]+)#\1${SERVER_IP}\2#" "$KUBECONFIG_FILE"
        fi

        # Install a CNI. With disableDefaultCNI=true the cluster ships no CNI, so
        # nodes stay NotReady until one is installed. Offer Cilium (CRDs via
        # kustomize, then the chart via the stuttgart-things helmfile).
        if gum confirm "Install Cilium CNI now? (required if disableDefaultCNI=true)"; then
          echo "Installing Cilium CRDs..."
          kubectl --kubeconfig "$KUBECONFIG_FILE" apply -k {{ .CILIUM_CRDS_KUSTOMIZE }}

          echo "Installing Cilium via helmfile (dagger)..."
          dagger call -m {{ .HELM_DAGGER_MODULE }} helmfile-operation \
            --helmfile-ref "{{ .CILIUM_HELMFILE_REF }}" \
            --operation apply \
            --state-values "config=kind,clusterName=$CLUSTER_NAME,configureLB=false" \
            --kube-config "file://$KUBECONFIG_FILE" \
            --progress plain

          echo "Waiting for nodes to become Ready..."
          kubectl --kubeconfig "$KUBECONFIG_FILE" wait --for=condition=Ready nodes --all --timeout=180s || true
        fi

        echo "Testing cluster access: kubectl --kubeconfig $KUBECONFIG_FILE get nodes"
        kubectl --kubeconfig "$KUBECONFIG_FILE" get nodes

        echo
        echo "To use this cluster:  export KUBECONFIG=$KUBECONFIG_FILE"
    vars:
      profiles:
        - keycloak/keycloak-cluster.yaml
      k8s_versions:
        - v1.34.0
        - v1.33.1
        - v1.32.2
        - v1.31.4
        - v1.30.8
      KUBECONFIG_PATH: ~/.kube
      # generate-kcl mode: stuttgart-things KCL kind-cluster module rendered via Dagger
      KCL_DAGGER_MODULE: github.com/stuttgart-things/dagger/kcl
      KIND_OCI_MODULE: ghcr.io/stuttgart-things/kind-cluster:0.4.0
      # optional CNI install (needed when disableDefaultCNI=true, i.e. no built-in CNI)
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.57.0
      CILIUM_CRDS_KUSTOMIZE: https://github.com/stuttgart-things/helm/infra/crds/cilium
      CILIUM_HELMFILE_REF: "git::https://github.com/stuttgart-things/helm.git@infra/cilium.yaml.gotmpl"

  deploy-platform:
    desc: Deploy the platform bundle (cilium/openebs/tekton/crossplane) via the central helmfile
    vars:
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.57.0
      HELM_GIT_REPO: git::https://github.com/stuttgart-things/helm.git
      BUNDLE_DIR: bundles
      BUNDLE_FILE: platform.yaml.gotmpl
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # SELECT KUBECONFIG
        SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
        export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
        echo "SWITCHING TO ${KUBECONFIG}"
        kubectl get nodes

        # SELECT COMPONENTS (pre-selected = bundle defaults)
        SELECTED=$(gum choose --no-limit --header "Components to deploy" \
          --selected="openebs,tekton,crossplane" \
          "openebs" "tekton" "crossplane" "cilium")
        [ -z "$SELECTED" ] && { echo "Nothing selected."; exit 0; }
        on() { echo "$SELECTED" | grep -qx "$1" && echo true || echo false; }
        STATE="openebsEnabled=$(on openebs),tektonEnabled=$(on tekton),crossplaneEnabled=$(on crossplane),ciliumEnabled=$(on cilium)"
        echo "Components: ${SELECTED//$'\n'/ }  ->  ${STATE}"

        gum confirm "Deploy platform bundle to ${KUBECONFIG}?" || exit 0

        # APPLY THE BUNDLE — composes the helm-repo helmfiles (remote) into one apply.
        dagger call -m {{ .HELM_DAGGER_MODULE }} \
          helmfile-operation \
          --operation apply \
          --src {{ .BUNDLE_DIR }} \
          --helmfile-ref {{ .BUNDLE_FILE }} \
          --state-values "${STATE}" \
          --kube-config file://${KUBECONFIG} \
          --progress plain -vv

        # FINALIZE CROSSPLANE — the bundle intentionally omits provider-configs
        # (their CRDs only exist once the providers/config are Healthy). Apply
        # them here, after waiting, if crossplane was part of this run.
        if echo "$SELECTED" | grep -qx crossplane; then
          echo "▶ Finalizing Crossplane provider-configs..."
          kubectl -n crossplane-system rollout status deploy/crossplane --timeout=180s
          kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          kubectl wait configuration.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          echo "Waiting for kubernetes.m.crossplane.io CRD (transitive provider-kubernetes)..."
          for i in $(seq 1 60); do
            kubectl get crd clusterproviderconfigs.kubernetes.m.crossplane.io >/dev/null 2>&1 && break
            sleep 5
          done
          kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          kubectl wait function.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
          dagger call -m {{ .HELM_DAGGER_MODULE }} \
            helmfile-operation \
            --operation apply \
            --helmfile-ref "{{ .HELM_GIT_REPO }}@cicd/crossplane-provider-configs.yaml.gotmpl" \
            --kube-config file://${KUBECONFIG} \
            --progress plain -vv
        fi

        echo "✅ PLATFORM DEPLOYED"
        kubectl get nodes

  deploy-crossplane:
    desc: Deploy Crossplane (core, providers, functions/configs, provider-configs) via dagger helmfile-operation
    vars:
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.57.0
      HELM_GIT_REPO: git::https://github.com/stuttgart-things/helm.git
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # SELECT KUBECONFIG
        SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
        export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
        echo "SWITCHING TO ${KUBECONFIG}"
        kubectl get nodes

        gum confirm "Deploy Crossplane to ${KUBECONFIG}?" || exit 0

        apply() {
          echo "▶ APPLYING: $1"
          dagger call -m {{ .HELM_DAGGER_MODULE }} \
            helmfile-operation \
            --operation apply \
            --helmfile-ref "{{ .HELM_GIT_REPO }}@$1" \
            --kube-config file://${KUBECONFIG} \
            --progress plain -vv
        }

        # 1) CORE — installs Crossplane + package CRDs
        apply cicd/crossplane.yaml.gotmpl
        kubectl -n crossplane-system rollout status deploy/crossplane --timeout=180s

        # 2) PROVIDERS — Provider CRs + RBAC only (ProviderConfigs are a
        #    separate helmfile, applied in step 4 once the CRDs exist).
        apply cicd/crossplane-providers.yaml.gotmpl
        kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s

        # 3) FUNCTIONS + CONFIGURATIONS — Configurations pull provider-kubernetes
        #    transitively via dependsOn, which creates the kubernetes.m.crossplane.io CRD.
        apply cicd/crossplane-config.yaml.gotmpl
        kubectl wait configuration.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s

        # wait for the transitive provider-kubernetes CRD before applying provider-configs
        echo "Waiting for kubernetes.m.crossplane.io CRD (transitive provider-kubernetes)..."
        for i in $(seq 1 60); do
          kubectl get crd clusterproviderconfigs.kubernetes.m.crossplane.io >/dev/null 2>&1 && break
          sleep 5
        done
        kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s
        kubectl wait function.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s

        # 4) PROVIDER-CONFIGS — separate helmfile; all ProviderConfig CRDs now exist
        apply cicd/crossplane-provider-configs.yaml.gotmpl

        echo "✅ CROSSPLANE DEPLOYED"
        kubectl get provider.pkg.crossplane.io,function.pkg.crossplane.io,configuration.pkg.crossplane.io

  deploy-tekton:
    desc: Deploy Tekton (operator + pipeline component) via dagger helmfile-operation
    vars:
      HELM_DAGGER_MODULE: github.com/stuttgart-things/dagger/helm@v0.57.0
      HELM_GIT_REPO: git::https://github.com/stuttgart-things/helm.git
      KUBECONFIG_PATH: ~/.kube
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # SELECT KUBECONFIG
        SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
        export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
        echo "SWITCHING TO ${KUBECONFIG}"
        kubectl get nodes

        gum confirm "Deploy Tekton to ${KUBECONFIG}?" || exit 0

        # APPLY — installs the Tekton Operator; with autoInstallComponents=false
        # + enableTektonPipeline=true the chart renders a TektonPipeline CR
        # (Pipelines only, no Dashboard/Triggers/Chains).
        echo "▶ APPLYING: cicd/tekton.yaml.gotmpl"
        dagger call -m {{ .HELM_DAGGER_MODULE }} \
          helmfile-operation \
          --operation apply \
          --helmfile-ref "{{ .HELM_GIT_REPO }}@cicd/tekton.yaml.gotmpl" \
          --kube-config file://${KUBECONFIG} \
          --progress plain -vv

        # WAIT for operator + the pipeline component to be ready
        kubectl -n tekton-operator rollout status deploy/tekton-operator --timeout=180s
        echo "Waiting for TektonPipeline CR to be created by the operator..."
        for i in $(seq 1 60); do
          kubectl get tektonpipeline pipeline >/dev/null 2>&1 && break
          sleep 5
        done
        kubectl wait tektonpipeline --all --for=condition=Ready --timeout=300s

        echo "✅ TEKTON DEPLOYED"
        kubectl get tektonpipeline
        kubectl -n tekton-pipelines get pods

  deploy-capabilities:
    desc: Deploy vspherevm/ansible/proxmoxvm platform capabilities from OCI charts (env-map) to a cluster
    vars:
      CHARTS_OCI: oci://ghcr.io/stuttgart-things/charts
      KUBECONFIG_PATH: ~/.kube
      # Pinned chart versions (bump on release).
      VSPHEREVM_VER: "0.7.0"
      ANSIBLE_VER: "0.2.0"
      PROXMOXVM_VER: "0.2.0"
      ALL_KUBECONFIGS:
        sh: ls {{ .KUBECONFIG_PATH }} | grep -v "^cache$" | xargs -n1 printf '"%s" '
    cmds:
      - |
        set -e

        # SELECT KUBECONFIG
        SELECTED_KUBECONFIG=$(gum choose {{ .ALL_KUBECONFIGS }})
        export KUBECONFIG={{ .KUBECONFIG_PATH }}/${SELECTED_KUBECONFIG//\"/}
        echo "SWITCHING TO ${KUBECONFIG}"
        kubectl get nodes

        # SELECT ENV (chart env-map key) + CAPABILITIES
        ENV=$(printf 'labda\nlabul\n' | gum choose --header "Environment (chart env-map)")
        CAPS=$(gum choose --no-limit --header "Capabilities to deploy" \
          --selected="vspherevm,ansible" vspherevm ansible proxmoxvm)
        [ -z "$CAPS" ] && { echo "Nothing selected."; exit 0; }

        # Dev clusters (kind) have no ESO/Vault, and for vsphere/proxmox the
        # XRD+Composition are applied by hand -> skip ESO secret creation + the
        # Configuration package install (out-of-band creds + manual XRD/Composition).
        if gum confirm "Dev cluster? (skip ESO secret creation + Configuration package install)"; then DEV=1; else DEV=0; fi

        gum confirm "Deploy [${CAPS//$'\n'/ }] for env=$ENV to ${KUBECONFIG}?" || exit 0

        ver()     { case "$1" in vspherevm) echo {{ .VSPHEREVM_VER }};; ansible) echo {{ .ANSIBLE_VER }};; proxmoxvm) echo {{ .PROXMOXVM_VER }};; esac; }
        toggles() {
          [ "$DEV" = "1" ] || { echo ""; return; }
          case "$1" in
            ansible)   echo "--set sshCredentials.create=false";;  # ansible: only an ExternalSecret, no Configuration
            *)         echo "--set secretStore.create=false --set configuration.install=false";;
          esac
        }

        for cap in $CAPS; do
          echo "▶ $cap ($ENV) v$(ver "$cap")"
          helm upgrade --install "$cap-$ENV" {{ .CHARTS_OCI }}/"$cap" --version "$(ver "$cap")" \
            --set environment="$ENV" $(toggles "$cap") \
            -n crossplane-system --create-namespace
        done

        echo "✅ CAPABILITIES DEPLOYED"
        helm list -n crossplane-system | grep -E 'vspherevm|ansible|proxmoxvm' || true
        kubectl get environmentconfig 2>/dev/null || true

  do:
    desc: Select a task to run
    cmds:
      - |
        # Extract task names (keep internal colons, remove only trailing colon)
        task_name=$(task -l | awk '/^\*/ {print $2}' | sed 's/:$//' | gum choose)

        # Run the selected task
        [ -n "$task_name" ] && task "$task_name"

  lint-platform-engineering-showcase-repo:
    desc: Lint platform-engineering-showcase repository
    cmds:
      - task: lint:lint-repository-files
        vars:
          CODE_DIR: "./"
          YAML_CONFIG_PATH: ".yamllint.yml"
          #EXPORT_PATH: "/tmp/whatever-showcase.txt"

  default:
    desc: Default task is select & do (work)
    cmds:
      - task do

  run-pre-commit-hook:
    deps:
      - check
    desc: "Run the pre-commit hook script to replace .example.com with .example.com"
    cmds:
      - |
        # Find all YAML files in the repository recursively, excluding Taskfile.yaml
        files=$(find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.yml" -o -name "*.md" \) ! -name "Taskfile.yaml")

        # Loop through each file
        for file in $files; do
          # Skip binary files
          if file "$file" | grep -q "text"; then
            # Replace the string and update the file
            sed -i 's/\.sva\.de/\.example\.com/g' "$file"
          fi
        done

        # Add all modified YAML files back to staging
        git add $(git ls-files --modified | grep -E '\.ya?ml$')

        exit 0
    silent: false
